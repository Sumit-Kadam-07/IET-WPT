<html>

<script>

function validateIt(){

    let u = document.forms["form1"]["username"].value
    let p = document.forms["form1"]["password"].value

    if(u == "iet" && p == "iet"){
        alert("Successful Login")
        window.location = "Home.html"
        return false
    }

    if(u.trim() == ""){
        alert("Username cannot be empty")
        document.forms["form1"]["username"].focus()
        return false
    }

    if(p.trim() == "" || p.length < 8 || p.length > 12){
        alert("Password must be between 8 and 12 characters")
        document.forms["form1"]["password"].focus()
        return false
    }

    window.location = "Home1.html"
    return false

}

</script>

<body>

<form name="form1" onsubmit="return validateIt()">

Username :
<input type="text" name="username">

<br><br>

Password :
<input type="password" name="password">

<br><br>

<input type="submit" value="Login">

</form>

</body>

</html>
