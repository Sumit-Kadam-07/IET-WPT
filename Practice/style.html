<!DOCTYPE html>
<html>
<head>
<title>Input Fields and Image</title>

<style>

body{
    margin-left: 100px;
    margin-right: 100px;
    font-family: Arial;
}

/* Input fields styling */
input{
    border: 3px solid blue;
    padding: 8px;
    margin-right: 20px;
}

/* Image styling */
img{
    margin-top: 50px;   /* distance from text fields */
    border: 4px solid red;
    border-radius: 20px;
}

</style>

</head>

<body>

<h2>Text Input Fields</h2>

<input type="text" placeholder="First Name">
<input type="text" placeholder="Last Name">
<input type="text" placeholder="City">

<br>

<img src="Images\monkey middle finger.png" alt="Sample Image">

</body>
</html>
