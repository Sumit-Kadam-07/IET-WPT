<!DOCTYPE html>
<html>
<head>

<script>

function changeText(){

    let text = document.getElementById("txt").value;

    let option = document.querySelector('input[name="case"]:checked').value;

    let result;

    if(option == "upper")
        result = text.toUpperCase();

    else if(option == "lower")
        result = text.toLowerCase();

    else
        result = text;

    document.getElementById("output").innerHTML = result;

}

</script>

</head>

<body>

Enter Text:
<input type="text" id="txt">

<br><br>

<input type="radio" name="case" value="upper" onclick="changeText()"> UpperCase
<input type="radio" name="case" value="lower" onclick="changeText()"> LowerCase
<input type="radio" name="case" value="same" onclick="changeText()"> As It Is

<br><br>

<p id="output"></p>

</body>
</html>
