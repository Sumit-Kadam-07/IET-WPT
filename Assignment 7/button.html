<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>

$(document).ready(function(){

$("#btn").click(function(){

$("#p1").text("Hello")
$("#p2").html("<i>Hello</i>")
$("#p3").html("<u>Hello</u>")

})

})

</script>

</head>

<body>

<button id="btn">OK</button>

<p id="p1"></p>
<p id="p2"></p>
<p id="p3"></p>

</body>
</html>
