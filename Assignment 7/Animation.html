<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>

        $(document).ready(function () {

            $("#start").click(function () {

                $("#box").animate({
                    left: '300px',
                    height: '100px',
                    width: '100px'
                })

            })

        })

    </script>

    <style>
        #box {
            width: 50px;
            height: 50px;
            background: rgb(28, 232, 225);
            position: relative;
        }
    </style>

    </head>

    <body>

        <button id="start">Start</button>

        <br><br>

        <div id="box"></div>

    </body>

</html>
