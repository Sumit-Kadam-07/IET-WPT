<!DOCTYPE html>
<html>
<head>
<title>Square Calculator</title>

<script>

function findSquare(){

    let num = document.getElementById("num").value;

    let square = num * num;

    document.getElementById("result").innerHTML =
    "Square of " + num + " is " + square;

}

</script>

</head>

<body>

<h2>Square Calculator</h2>

Enter Number:
<input type="number" id="num" required>

<br><br>

<button onclick="findSquare()">Find Square</button>

<br><br>

<p id="result"></p>

</body>
</html>
